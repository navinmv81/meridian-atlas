<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market Terminal | Pro Systems Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #d1d5db; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow: hidden; }
        .terminal-grid { display: grid; grid-template-columns: 320px 1fr 320px; grid-template-rows: calc(100vh - 40px); gap: 1px; background-color: #1f2937; }
        .panel { background-color: #0b0e14; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background-color: #161b22; padding: 6px 10px; border-bottom: 1px solid #30363d; font-size: 10px; font-weight: 700; color: #8b949e; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .text-up { color: #3fb950; }
        .text-down { color: #f85149; }
        .tab-active { border-bottom: 2px solid #58a6ff; color: #f0f6fc; }
        th { font-size: 8px; color: #484f58; text-align: left; padding: 6px 4px; border-bottom: 1px solid #30363d; white-space: nowrap; position: sticky; top: 0; background: #0b0e14; z-index: 10; }
        td { padding: 4px; border-bottom: 1px solid #161b22; white-space: nowrap; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 2px 4px; font-size: 9px; width: 100%; }
        .filter-label { font-size: 7px; color: #6e7681; text-transform: uppercase; margin-bottom: 2px; display: block; }
        .ticker-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #161b22; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #30363d; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="h-10 bg-[#161b22] border-b border-[#30363d] flex items-center px-4 justify-between shrink-0 z-50">
        <div class="flex items-center space-x-8">
            <span class="text-blue-500 font-bold tracking-widest text-xs">MERIDIAN TERMINAL v2.5</span>
            <div class="flex space-x-6">
                <button onclick="switchView('markets')" id="tab-markets-btn" class="tab-active py-2 text-[10px] font-bold">MARKETS</button>
                <button onclick="switchView('research')" id="tab-research-btn" class="py-2 text-[10px] font-bold text-gray-500 hover:text-white">QUANT RESEARCH</button>
            </div>
        </div>
        <div id="clock" class="text-gray-400 font-mono text-[9px]">00:00:00 UTC</div>
    </nav>

    <main id="view-markets" class="flex-1 terminal-grid">
        <div class="flex flex-col gap-[1px] bg-gray-800">
            <div class="panel h-1/2">
                <div class="panel-header"><span>Global Indices</span></div>
                <div class="scroll-area" id="idx-dev"></div>
            </div>
            <div class="panel h-1/2">
                <div class="panel-header"><span>Economic Calendar</span></div>
                <div class="scroll-area"><table class="w-full text-[10px]"><tbody id="fred-calendar-body"></tbody></table></div>
            </div>
        </div>

        <div class="flex flex-col gap-[1px] bg-gray-800">
            <div class="panel h-[60%]">
                <div class="panel-header">
                    <span>Top 25 Equities</span>
                    <div class="flex gap-4">
                        <button onclick="setRegion('US')" id="reg-us-btn" class="text-white">US</button>
                        <button onclick="setRegion('EU')" id="reg-eu-btn" class="text-gray-500">EU</button>
                    </div>
                </div>
                <div class="overflow-y-auto"><table class="w-full"><tbody id="equity-body" class="text-[10px]"></tbody></table></div>
            </div>
            <div class="panel h-[40%]">
                <div class="panel-header"><span>FX & Commodities</span></div>
                <div class="flex h-full">
                    <div class="w-1/2 border-r border-gray-800 scroll-area" id="fx-list"></div>
                    <div class="w-1/2 scroll-area" id="comm-list"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-[1px] bg-gray-800">
            <div class="panel h-1/2">
                <div class="panel-header"><span>Market Wire</span></div>
                <div class="scroll-area space-y-4" id="news-feed"></div>
            </div>
            <div class="panel h-1/2">
                <div class="panel-header"><span>Daily Movers</span></div>
                <div class="scroll-area" id="fmp-dynamic-content"></div>
            </div>
        </div>
    </main>

    <main id="view-research" class="hidden flex-1 overflow-hidden bg-[#05070a] flex flex-col">
        <div class="p-3 bg-[#0b0e14] border-b border-gray-800">
            <div class="flex justify-between items-center mb-3">
                <span class="text-blue-400 font-bold text-[10px]">21-VECTOR QUANTITATIVE FILTER</span>
                <button onclick="runAdvancedScreener()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-1 rounded text-[9px] font-bold">EXECUTE SCAN</button>
            </div>
            <div class="grid grid-cols-5 gap-4">
                <div class="metric-group border-r border-gray-800 pr-2">
                    <span class="filter-label text-blue-400">Valuation</span>
                    <div class="grid grid-cols-2 gap-1">
                        <div><label class="filter-label">Max P/E</label><input type="number" id="f-pe" value="40"></div>
                        <div><label class="filter-label">Max P/S</label><input type="number" id="f-ps" value="15"></div>
                        <div><label class="filter-label">Max P/B</label><input type="number" id="f-pb" value="8"></div>
                        <div><label class="filter-label">Max EV/EBITDA</label><input type="number" id="f-evebitda" value="25"></div>
                    </div>
                </div>
                <div class="metric-group border-r border-gray-800 pr-2">
                    <span class="filter-label text-orange-400">Yield & Size</span>
                    <div class="grid grid-cols-2 gap-1">
                        <div><label class="filter-label">Min Yield%</label><input type="number" id="f-yield" value="0.5"></div>
                        <div><label class="filter-label">Max Payout%</label><input type="number" id="f-payout" value="70"></div>
                        <div><label class="filter-label">Min Cap (B)</label><input type="number" id="f-cap" value="50"></div>
                        <div><label class="filter-label">Sector</label><select id="f-sector"><option value="Technology">Technology</option><option value="Healthcare">Healthcare</option><option value="Financial Services">Finance</option></select></div>
                    </div>
                </div>
                <div class="metric-group border-r border-gray-800 pr-2">
                    <span class="filter-label text-green-400">Profitability</span>
                    <div class="grid grid-cols-2 gap-1">
                        <div><label class="filter-label">Min ROE%</label><input type="number" id="f-roe" value="15"></div>
                        <div><label class="filter-label">Min ROA%</label><input type="number" id="f-roa" value="5"></div>
                        <div><label class="filter-label">Min Gross%</label><input type="number" id="f-gross" value="30"></div>
                        <div><label class="filter-label">Min Net%</label><input type="number" id="f-net" value="10"></div>
                    </div>
                </div>
                <div class="metric-group border-r border-gray-800 pr-2">
                    <span class="filter-label text-purple-400">Growth</span>
                    <div class="grid grid-cols-2 gap-1">
                        <div><label class="filter-label">Rev Gr%</label><input type="number" id="f-revg" value="8"></div>
                        <div><label class="filter-label">EPS Gr%</label><input type="number" id="f-epsg" value="10"></div>
                        <div><label class="filter-label">FCF Gr%</label><input type="number" id="f-fcfg" value="5"></div>
                        <div><label class="filter-label">Max D/E</label><input type="number" id="f-de" value="1.5"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex-1 overflow-auto">
            <table class="w-full text-[9px] font-mono"><thead id="adv-head"></thead><tbody id="adv-screener-body"></tbody></table>
        </div>
    </main>

    <script>
        const PROXY = "https://meridian-proxy.navinmv1981.workers.dev/";
        const SYMBOLS = {
            dev: ['^GSPC', '^IXIC', '^FTSE', '^GDAXI', '^N225'],
            us_stocks: ['AAPL', 'MSFT', 'NVDA', 'AMZN', 'GOOGL', 'META', 'BRK-B', 'LLY', 'AVGO', 'TSLA', 'JPM', 'UNH', 'V', 'XOM', 'MA', 'COST', 'HD', 'PG', 'ABBV', 'NFLX', 'AMD', 'ADBE', 'CRM', 'ORCL', 'BAC'],
            eu_stocks: ['ASML.AS', 'MC.PA', 'NESN.SW', 'OR.PA', 'NOVO-B.CO', 'SAP.DE', 'SHEL.L', 'AZN.L', 'ROG.SW', 'NOVN.SW', 'TTE.PA', 'HSBA.L', 'SIE.DE', 'SAN.MC', 'LVMH.PA', 'AIR.PA', 'IBE.MC', 'ULVR.L', 'AIRP.PA', 'BNP.PA', 'VOW3.DE', 'MBG.DE', 'DTE.DE', 'BHP.L', 'BP.L'],
            fx: ['EURUSD=X', 'GBPUSD=X', 'USDJPY=X', 'USDCHF=X', 'AUDUSD=X', 'USDCAD=X'],
            comm: ['CL=F', 'GC=F', 'SI=F', 'HG=F', 'ZC=F']
        };
        let currentRegion = 'US';

        async function fetchSource(source, params = {}) {
            const url = new URL(PROXY);
            url.searchParams.set('source', source);
            Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
            try { const res = await fetch(url.toString()); return await res.json(); } catch(e) { return null; }
        }

       async function fetchSource(source, params = {}) {
    // 1. Ensure the PROXY URL ends with a forward slash
    let baseUrl = PROXY;
    if (!baseUrl.endsWith('/')) baseUrl += '/';

    // 2. Build the URL manually to ensure it's 100% correct
    let url = `${baseUrl}?source=${source}`;
    
    // 3. Append any extra parameters (symbols, series, etc.)
    Object.entries(params).forEach(([k, v]) => {
        url += `&${k}=${encodeURIComponent(v)}`;
    });

    try {
        console.log("Fetching from:", url); // This lets you see the URL in F12 Console
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        return await res.json();
    } catch (e) {
        console.error("Fetch failed for " + source, e);
        return null;
    }
}

        function renderYahoo(data) {
            const row = (s) => {
                const d = data[s] || { price: 0, changePercent: 0 };
                return `<div class="ticker-row"><span>${s.replace('^','')}</span><div class="font-mono"><span>${d.price.toLocaleString()}</span> <span class="${d.changePercent >= 0 ? 'text-up' : 'text-down'}">${d.changePercent.toFixed(2)}%</span></div></div>`;
            };
            document.getElementById('idx-dev').innerHTML = SYMBOLS.dev.map(row).join('');
            document.getElementById('fx-list').innerHTML = SYMBOLS.fx.map(row).join('');
            document.getElementById('comm-list').innerHTML = SYMBOLS.comm.map(row).join('');
            
            const rList = currentRegion === 'US' ? SYMBOLS.us_stocks : SYMBOLS.eu_stocks;
            document.getElementById('equity-body').innerHTML = rList.map(s => {
                const d = data[s] || { price: 0, changePercent: 0 };
                return `<tr class="hover:bg-[#161b22]"><td>${s.split('.')[0]}</td><td class="text-right">${d.price.toLocaleString()}</td><td class="text-right ${d.changePercent >= 0 ? 'text-up' : 'text-down'}">${d.changePercent.toFixed(2)}%</td></tr>`;
            }).join('');
        }

        function renderMacro(data) {
            const m = [
                { l: 'GDP Growth', v: data.gdp ? data.gdp.observations.slice(-1)[0].value + '%' : '--' },
                { l: 'CPI Y/Y', v: data.cpi ? data.cpi.observations.slice(-1)[0].value : '--' },
                { l: 'Unemployment', v: data.unrate ? data.unrate.observations.slice(-1)[0].value + '%' : '--' },
                { l: 'Fed Funds', v: data.fed ? data.fed.observations.slice(-1)[0].value + '%' : '--' }
            ];
            document.getElementById('fred-calendar-body').innerHTML = m.map(i => `<tr><td class="py-2 text-gray-400 font-bold">${i.l}</td><td class="text-right text-blue-400 font-bold">${i.v}</td></tr>`).join('');
        }

        function renderNews(news) {
            document.getElementById('news-feed').innerHTML = news.slice(0,8).map(n => `<div class="group"><div class="text-[8px] text-blue-500 font-bold">${n.source.name}</div><h3 class="text-gray-200 group-hover:underline text-[10px] leading-tight">${n.title}</h3></div>`).join('');
        }

        function renderMovers(data) {
            document.getElementById('fmp-dynamic-content').innerHTML = data.slice(0,10).map(m => `<div class="flex justify-between py-1 border-b border-gray-900"><span>${m.symbol}</span><span class="text-up">+${m.changesPercentage.toFixed(2)}%</span></div>`).join('');
        }

        async function runAdvancedScreener() {
            const body = document.getElementById('adv-screener-body');
            body.innerHTML = '<tr><td colspan="10" class="text-center py-20 text-blue-500 animate-pulse">FILTERING 21 VECTORS...</td></tr>';
            const data = await fetchSource('fmp', { endpoint: 'stock-screener', sector: document.getElementById('f-sector').value, marketCapMoreThan: document.getElementById('f-cap').value * 1e9, limit: 100 });
            if (data) {
                body.innerHTML = data.map(r => `
                    <tr class="hover:bg-[#161b22] border-b border-gray-900">
                        <td class="text-blue-400 font-bold">${r.symbol}</td>
                        <td>${r.pe ? r.pe.toFixed(1) : '--'}</td>
                        <td>${r.ps ? r.ps.toFixed(1) : '--'}</td>
                        <td>${r.evToEbitda ? r.evToEbitda.toFixed(1) : '--'}</td>
                        <td class="text-orange-400">${r.dividendYield ? r.dividendYield.toFixed(2) : '0.00'}</td>
                        <td class="${r.roe > 0.15 ? 'text-green-500' : ''}">${r.roe ? (r.roe * 100).toFixed(1) : '--'}</td>
                        <td>${r.netProfitMargin ? (r.netProfitMargin * 100).toFixed(1) : '--'}</td>
                        <td>${r.revenueGrowth ? (r.revenueGrowth * 100).toFixed(1) : '--'}</td>
                        <td>${r.debtToEquity ? r.debtToEquity.toFixed(2) : '--'}</td>
                        <td class="text-right">${(r.marketCap/1e9).toFixed(1)}B</td>
                    </tr>`).join('');
            }
        }

        function switchView(v) {
            document.getElementById('view-markets').style.display = v === 'markets' ? 'grid' : 'none';
            document.getElementById('view-research').style.display = v === 'research' ? 'flex' : 'none';
            document.getElementById('tab-markets-btn').className = v === 'markets' ? 'tab-active py-2 text-[10px] font-bold' : 'py-2 text-[10px] font-bold text-gray-500';
            document.getElementById('tab-research-btn').className = v === 'research' ? 'tab-active py-2 text-[10px] font-bold' : 'py-2 text-[10px] font-bold text-gray-500';
        }
        function setRegion(r) { currentRegion = r; refreshMarkets(); }
        function updateClock() { document.getElementById('clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC"; }
        
        setInterval(refreshMarkets, 60000);
        setInterval(updateClock, 1000);
        refreshMarkets();
    </script>
</body>
</html>
