<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERIDIAN ATLAS v2.5 | GLOBAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains+Mono', monospace; background-color: #060606; color: #d1d5db; overflow-x: hidden; }
        .terminal-border { border: 1px solid #1f2937; }
        .data-row:hover { background-color: #111827; cursor: crosshair; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .price-up { color: #10b981; }
        .price-down { color: #ef4444; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1f2937; }
    </style>
</head>
<body class="p-4 uppercase text-[10px] tracking-tighter">

    <div class="flex justify-between items-center mb-4 terminal-border p-4 bg-black">
        <div>
            <h1 class="text-blue-500 font-bold text-xl tracking-widest italic">MERIDIAN ATLAS v2.5</h1>
            <p class="text-[9px] text-gray-500">NETWORK: <span class="text-green-500 status-pulse">ACTIVE</span> // SOURCE: MULTI-VECTOR PROXY</p>
        </div>
        <div class="text-right">
            <div id="clock" class="text-blue-400 font-bold text-lg">00:00:00</div>
            <div class="text-gray-600 text-[9px]">SYSTEM TIME [UTC]</div>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-4">
        
        <div class="col-span-12 lg:col-span-3 space-y-4">
            <div class="terminal-border bg-black p-3">
                <h2 class="text-blue-500 mb-2 border-b border-gray-800 pb-1 flex justify-between">
                    <span>GLOBAL INDICES</span>
                    <span class="text-gray-600">LIVE</span>
                </h2>
                <div id="indices-box" class="space-y-1"></div>
            </div>

            <div class="terminal-border bg-black p-3">
                <h2 class="text-blue-500 mb-2 border-b border-gray-800 pb-1 italic">MACRO & FX</h2>
                <div id="macro-box" class="space-y-1"></div>
            </div>

            <div class="terminal-border bg-black p-3">
                <h2 class="text-orange-500 mb-2 border-b border-gray-800 pb-1 uppercase">Crypto Core</h2>
                <div id="crypto-box" class="space-y-1"></div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-6 space-y-4">
            <div class="terminal-border bg-black p-3">
                <div class="flex justify-between items-center mb-3 border-b border-gray-800 pb-2">
                    <h2 class="text-blue-500 font-bold">EQUITY SCANNER <span id="region-label" class="text-white ml-2">[US]</span></h2>
                    <div class="flex gap-2">
                        <button onclick="setRegion('US')" id="btn-US" class="px-2 py-1 bg-blue-900 text-white border border-blue-500">US MKTS</button>
                        <button onclick="setRegion('EU')" id="btn-EU" class="px-2 py-1 bg-black text-gray-500 border border-gray-800">EU MKTS</button>
                    </div>
                </div>
                <div class="h-[430px] overflow-y-auto">
                    <table class="w-full text-left">
                        <thead class="sticky top-0 bg-black text-gray-600 border-b border-gray-900">
                            <tr>
                                <th class="p-1">TICKER</th>
                                <th class="p-1">PRICE</th>
                                <th class="p-1">CHG%</th>
                                <th class="p-1 text-right">MKT CAP</th>
                            </tr>
                        </thead>
                        <tbody id="screener-body" class="divide-y divide-gray-900"></tbody>
                    </table>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="terminal-border bg-black p-3 text-center">
                    <span class="text-gray-600 block mb-1">US GDP GROWTH (Q/Q)</span>
                    <span id="gdp-val" class="text-2xl font-bold text-white">---</span>
                </div>
                <div class="terminal-border bg-black p-3 text-center">
                    <span class="text-gray-600 block mb-1">US CPI (INFLATION)</span>
                    <span id="cpi-val" class="text-2xl font-bold text-white">---</span>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-4">
            <div class="terminal-border bg-black p-3 h-[585px] overflow-hidden">
                <h2 class="text-blue-500 mb-2 border-b border-gray-800 pb-1 uppercase italic">SEC & News Intel</h2>
                <div id="news-container" class="space-y-4">
                    <p class="animate-pulse text-gray-700">Connecting to EDGAR/News stream...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PROXY = "https://meridian-proxy.navinmv1981.workers.dev/";
        
        const SYMBOLS = {
            indices: ['^GSPC', '^IXIC', '^FTSE', '^GDAXI', '^N225'],
            us_stocks: ['AAPL', 'MSFT', 'NVDA', 'AMZN', 'GOOGL', 'META', 'TSLA', 'BRK-B', 'LLY', 'AVGO', 'JPM', 'UNH', 'V', 'XOM', 'MA', 'COST', 'HD', 'PG', 'ABBV', 'NFLX'],
            eu_stocks: ['ASML.AS', 'MC.PA', 'NESN.SW', 'OR.PA', 'NOVO-B.CO', 'SAP.DE', 'SHEL.L', 'AZN.L', 'ROG.SW', 'NOVN.SW', 'TTE.PA', 'HSBA.L', 'SIE.DE', 'SAN.MC'],
            macro: ['EURUSD=X', 'GBPUSD=X', 'USDJPY=X', 'CL=F', 'GC=F', 'SI=F'],
            crypto: ['BTC-USD', 'ETH-USD', 'SOL-USD']
        };

        let currentRegion = 'US';

        async function fetchSource(source, params = {}) {
            let baseUrl = PROXY;
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            let url = `${baseUrl}?source=${source}`;
            Object.entries(params).forEach(([k, v]) => url += `&${k}=${encodeURIComponent(v)}`);
            try {
                const res = await fetch(url);
                return res.ok ? await res.json() : null;
            } catch (e) { return null; }
        }

        async function refreshMarkets() {
            const groupList = [...SYMBOLS.indices, ...SYMBOLS.macro, ...SYMBOLS.crypto].join(',');
            const mkt = await fetchSource('yahoo', { symbols: groupList });
            if (mkt && mkt.quoteResponse) renderGroup(mkt.quoteResponse.result);

            const stockList = (currentRegion === 'US' ? SYMBOLS.us_stocks : SYMBOLS.eu_stocks).join(',');
            const stocks = await fetchSource('yahoo', { symbols: stockList });
            if (stocks && stocks.quoteResponse) renderScreener(stocks.quoteResponse.result);
        }

        async function refreshMacro() {
            const gdp = await fetchSource('fred', { series: 'A191RL1Q225SBEA' });
            if (gdp && gdp.observations) document.getElementById('gdp-val').innerText = gdp.observations[0].value + '%';
            
            const cpi = await fetchSource('fred', { series: 'CPIAUCSL' });
            if (cpi && cpi.observations) document.getElementById('cpi-val').innerText = cpi.observations[0].value + '%';
        }

        async function refreshNews() {
            const news = await fetchSource('news', { query: currentRegion === 'US' ? 'SEC Filing' : 'European Central Bank' });
            if (news && news.articles) {
                document.getElementById('news-container').innerHTML = news.articles.slice(0, 8).map(a => `
                    <div class="border-l border-gray-800 pl-2 py-1 hover:border-blue-500">
                        <div class="text-[8px] text-gray-600">${new Date(a.publishedAt).toLocaleTimeString()} - ${a.source.name}</div>
                        <a href="${a.url}" target="_blank" class="block hover:text-blue-400 leading-tight">${a.title.substring(0, 75)}...</a>
                    </div>
                `).join('');
            }
        }

        function renderGroup(quotes) {
            const boxes = { indices: 'indices-box', macro: 'macro-box', crypto: 'crypto-box' };
            Object.values(boxes).forEach(id => document.getElementById(id).innerHTML = '');
            quotes.forEach(q => {
                let boxId = SYMBOLS.indices.includes(q.symbol) ? 'indices-box' : SYMBOLS.macro.includes(q.symbol) ? 'macro-box' : SYMBOLS.crypto.includes(q.symbol) ? 'crypto-box' : null;
                if (boxId) {
                    const pct = q.regularMarketChangePercent || 0;
                    document.getElementById(boxId).innerHTML += `
                        <div class="flex justify-between data-row p-1 border-b border-gray-900">
                            <span class="text-gray-400">${q.symbol.replace('^', '').replace('=X', '')}</span>
                            <span class="text-white">${q.regularMarketPrice.toLocaleString()}</span>
                            <span class="${pct >= 0 ? 'text-green-500' : 'text-red-500'}">${pct.toFixed(2)}%</span>
                        </div>`;
                }
            });
        }

        function renderScreener(stocks) {
            document.getElementById('screener-body').innerHTML = stocks.map(s => `
                <tr class="data-row">
                    <td class="p-1 font-bold text-blue-400">${s.symbol}</td>
                    <td class="p-1 text-white">${s.regularMarketPrice.toFixed(2)}</td>
                    <td class="p-1 ${s.regularMarketChangePercent >= 0 ? 'text-green-500' : 'text-red-500'}">${s.regularMarketChangePercent.toFixed(2)}%</td>
                    <td class="p-1 text-right text-gray-600">${s.marketCap ? (s.marketCap / 1e12).toFixed(2) + 'T' : '---'}</td>
                </tr>`).join('');
        }

        function setRegion(r) {
            currentRegion = r;
            document.getElementById('region-label').innerText = `[${r}]`;
            document.getElementById('btn-US').className = r === 'US' ? 'px-2 py-1 bg-blue-900 text-white border border-blue-500' : 'px-2 py-1 bg-black text-gray-500 border border-gray-800';
            document.getElementById('btn-EU').className = r === 'EU' ? 'px-2 py-1 bg-blue-900 text-white border border-blue-500' : 'px-2 py-1 bg-black text-gray-500 border border-gray-800';
            refreshMarkets();
        }

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }

        window.addEventListener('load', () => {
            updateClock(); refreshMarkets(); refreshMacro(); refreshNews();
            setInterval(updateClock, 1000);
            setInterval(refreshMarkets, 60000);
            setInterval(refreshNews, 300000);
        });
    </script>
</body>
</html>
